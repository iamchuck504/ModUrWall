<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; connect-src 'self' https://sar1a.lempyra.com; font-src 'self' https://fonts.gstatic.com; style-src 'self' https://fonts.googleapis.com 'unsafe-inline'; script-src 'self' 'unsafe-inline'; img-src 'self' data: blob:;">
<title>ModUrWall — Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=Space+Mono:wght@400;700&family=Outfit:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-deep:       #0a0a0f;
    --bg-card:       #111118;
    --border:        #1e1e2e;
    --border-focus:  rgba(0,229,255,0.4);
    --accent-cyan:   #00e5ff;
    --accent-magenta:#ff2d78;
    --text-primary:  #eaeaf0;
    --text-secondary:#7a7a8e;
    --text-muted:    #4a4a5e;
    --font-display:  'Outfit', sans-serif;
    --font-body:     'DM Sans', sans-serif;
    --font-mono:     'Space Mono', monospace;
    --radius:        16px;
    --radius-sm:     10px;
  }

  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg-deep);
    color: var(--text-primary);
    font-family: var(--font-body);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ── BACKGROUND ── */
  .bg-mesh {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
  }
  .bg-mesh::before {
    content: '';
    position: absolute;
    width: 700px; height: 700px;
    top: -200px; left: -150px;
    background: radial-gradient(circle, rgba(0,229,255,0.07) 0%, transparent 60%);
    animation: drift1 22s ease-in-out infinite;
  }
  .bg-mesh::after {
    content: '';
    position: absolute;
    width: 600px; height: 600px;
    bottom: -100px; right: -100px;
    background: radial-gradient(circle, rgba(255,45,120,0.06) 0%, transparent 60%);
    animation: drift2 28s ease-in-out infinite;
  }
  @keyframes drift1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(80px,60px)} }
  @keyframes drift2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-60px,-40px)} }

  .noise-overlay {
    position: fixed; inset: 0; z-index: 1;
    opacity: 0.02; pointer-events: none;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  }

  /* ── CARD ── */
  .login-wrap {
    position: relative; z-index: 2;
    width: 100%; max-width: 420px;
    padding: 20px;
    animation: fadeUp 0.6s ease-out;
  }
  @keyframes fadeUp {
    from { opacity:0; transform:translateY(20px); }
    to   { opacity:1; transform:translateY(0); }
  }

  .login-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 40px 36px 36px;
    position: relative;
    overflow: hidden;
  }

  /* gradient border top */
  .login-card::before {
    content: '';
    position: absolute; top:0; left:0; right:0; height:2px;
    background: linear-gradient(90deg, var(--accent-cyan), var(--accent-magenta));
  }

  /* ── HEADER ── */
  .card-logo {
    font-family: var(--font-display);
    font-weight: 800;
    font-size: 1.6rem;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, var(--accent-cyan), var(--accent-magenta));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 6px;
  }

  .card-tagline {
    font-size: 0.88rem;
    color: var(--text-secondary);
    margin-bottom: 32px;
  }

  /* ── STATUS BAR ── */
  .status-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 14px;
    border-radius: var(--radius-sm);
    background: rgba(255,255,255,0.02);
    border: 1px solid var(--border);
    margin-bottom: 28px;
  }
  .gw-dot {
    width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
  }
  .gw-dot.checking  { background: var(--accent-cyan); animation: blink 1.4s ease-in-out infinite; }
  .gw-dot.online    { background: #22c55e; }
  .gw-dot.offline   { background: var(--accent-magenta); }
  @keyframes blink { 0%,100%{opacity:.3} 50%{opacity:1} }
  #status-msg {
    font-family: var(--font-mono);
    font-size: 0.6rem;
    letter-spacing: 0.5px;
    color: var(--text-secondary);
  }

  /* ── FORM ── */
  .field { margin-bottom: 16px; }

  .field label {
    display: block;
    font-size: 0.78rem;
    font-weight: 500;
    color: var(--text-secondary);
    margin-bottom: 8px;
  }

  .field input {
    width: 100%;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text-primary);
    font-family: var(--font-body);
    font-size: 0.95rem;
    padding: 12px 16px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    -webkit-appearance: none;
  }
  .field input:focus {
    border-color: var(--border-focus);
    box-shadow: 0 0 0 3px rgba(0,229,255,0.07);
  }
  .field input::placeholder { color: var(--text-muted); }

  #error-msg {
    font-family: var(--font-mono);
    font-size: 0.68rem;
    color: var(--accent-magenta);
    min-height: 20px;
    margin-bottom: 14px;
    letter-spacing: 0.3px;
  }

  #submit-btn {
    width: 100%;
    background: linear-gradient(135deg, var(--accent-cyan), #00bbdd);
    color: var(--bg-deep);
    border: none;
    border-radius: var(--radius-sm);
    font-family: var(--font-display);
    font-size: 0.95rem;
    font-weight: 700;
    padding: 14px;
    cursor: pointer;
    transition: all 0.25s;
    letter-spacing: 0.3px;
  }
  #submit-btn:hover:not(:disabled) {
    box-shadow: 0 4px 24px rgba(0,229,255,0.3);
    transform: translateY(-1px);
  }
  #submit-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  /* ── FOOTER ── */
  .card-footer {
    margin-top: 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .back-link {
    font-size: 0.8rem;
    color: var(--text-muted);
    text-decoration: none;
    transition: color 0.2s;
  }
  .back-link:hover { color: var(--accent-cyan); }
  .powered-tag {
    font-family: var(--font-mono);
    font-size: 0.58rem;
    color: var(--text-muted);
    letter-spacing: 0.5px;
  }
  .powered-tag span { color: var(--accent-magenta); }
</style>
</head>
<body>

<div class="bg-mesh"></div>
<div class="noise-overlay"></div>

<div class="login-wrap">
  <div class="login-card">

    <div class="card-logo">ModUrWall</div>
    <div class="card-tagline">Sign in to your account</div>

    <div class="status-bar">
      <div class="gw-dot checking" id="gw-dot"></div>
      <span id="status-msg">connecting to sar1a...</span>
    </div>

    <form id="login-form" onsubmit="return false;">
      <div class="field">
        <label for="username">Username</label>
        <input id="username" type="text" placeholder="your username"
               autocomplete="username" autocapitalize="none" spellcheck="false">
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input id="password" type="password" placeholder="••••••••"
               autocomplete="current-password">
      </div>
      <div id="error-msg"></div>
      <button id="submit-btn" type="submit">Sign In</button>
    </form>

    <div class="card-footer">
      <a href="../" class="back-link">← Back to ModUrWall</a>
      <span class="powered-tag">Lempyr<span>λ</span> · TLS 1.3</span>
    </div>

  </div>
</div>

<script>
var AUTH = {
    url:        'https://sar1a.lempyra.com',
    clientId:   'portal',
    scope:      'payments,ink,profile',
    tokenKey:   'modurwall_token',
    refreshKey: 'modurwall_refresh',
    userKey:    'modurwall_user'
};

// Already logged in → go to app
if (sessionStorage.getItem(AUTH.tokenKey)) {
    window.location.replace('../dashboard/');
}

var gwDot    = document.getElementById('gw-dot');
var statusEl = document.getElementById('status-msg');
var errorEl  = document.getElementById('error-msg');
var submitBtn= document.getElementById('submit-btn');

async function checkGateway() {
    try {
        var opts = { method: 'GET' };
        try { opts.signal = AbortSignal.timeout(5000); } catch(_) {}
        var res = await fetch(AUTH.url + '/auth/health', opts);
        if (res.ok) {
            gwDot.className = 'gw-dot online';
            statusEl.textContent = 'sar1a online · gateway ready';
            return;
        }
    } catch(e) {}
    gwDot.className = 'gw-dot offline';
    statusEl.textContent = 'sar1a unreachable · check connection';
}

async function doLogin(username, password) {
    errorEl.textContent = '';
    submitBtn.disabled = true;
    submitBtn.textContent = 'Signing in...';

    try {
        // Step 1: authorize → code
        var authRes = await fetch(AUTH.url + '/auth/authorize', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                username:  username,
                password:  password,
                client_id: AUTH.clientId,
                scope:     AUTH.scope
            })
        });
        var authData = await authRes.json();
        if (!authRes.ok) throw new Error(authData.detail || authData.error || 'Authorization failed');
        var code = authData.authorization_code || authData.code;
        if (!code) throw new Error('No authorization code received');

        // Step 2: token exchange — client_secret is the user password, never hardcoded
        var tokRes = await fetch(AUTH.url + '/auth/token', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                grant_type:    'authorization_code',
                code:          code,
                client_id:     AUTH.clientId,
                client_secret: password
            })
        });
        var tokData = await tokRes.json();
        if (!tokRes.ok) throw new Error(tokData.detail || tokData.error || 'Token exchange failed');

        sessionStorage.setItem(AUTH.tokenKey,   tokData.access_token);
        if (tokData.refresh_token) sessionStorage.setItem(AUTH.refreshKey, tokData.refresh_token);
        sessionStorage.setItem(AUTH.userKey, username);

        submitBtn.textContent = '✓ Authenticated';
        window.location.replace('../dashboard/');

    } catch(e) {
        errorEl.textContent = e.message || 'Login failed';
        submitBtn.disabled  = false;
        submitBtn.textContent = 'Sign In';
    }
}

document.getElementById('login-form').addEventListener('submit', function() {
    var u = document.getElementById('username').value.trim();
    var p = document.getElementById('password').value;
    if (!u || !p) { errorEl.textContent = 'Username and password required'; return; }
    doLogin(u, p);
});

document.getElementById('password').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') document.getElementById('login-form').dispatchEvent(new Event('submit'));
});

checkGateway();
</script>
</body>
</html>
